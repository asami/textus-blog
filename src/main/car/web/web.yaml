defaultView: summary
apps:
  - name: blog
    kind: static-form
    path: /web/blog
    root: /web/blog
    route: /web/blog
    layout: default
    assets:
      css:
        - /web/blog/assets/blog.css
      js:
        - /web/blog/assets/blog.js

pages:
  index:
    layout: default
  publicblogs:
    layout: reader
  userblogs:
    layout: my
  new:
    layout: edit
  update:
    layout: edit

expose:
  blog-component.blog.import-post-tree: protected
  blog-component.blog.register-post: protected
  blog-component.blog.save-editor-post: protected
  blog-component.blog.list-image-blobs: protected
  blog-component.blog.create-post: protected
  blog-component.blog.get-post: public
  blog-component.blog.get-my-post: protected
  blog-component.blog.search-posts: public
  blog-component.blog.search-my-posts: protected
  blog-component.blog.atom-feed: public
  blog-component.blog.publish-post: protected
  blog-component.blog.deactivate-post: protected
  blog-component.blog.sync-inline-images: protected
  blog-component.blog.search-inline-images: public
  blog-component.blog.list-tags: public

form:
  blog-component.blog.import-post-tree:
    enabled: true
    layout: plain-result
    successRedirect: /web/blog/userblogs
    stayOnError: true
    controls:
      fileBundle:
        type: file
        accept: .zip,application/zip
        required: true
  blog-component.blog.save-editor-post:
    enabled: true
    layout: plain-result
    controls:
      contentMarkup:
        type: select
        values: [html-fragment, markdown-gfm, smartdox]
        required: false
      content:
        type: textarea
        required: true
  blog-component.blog.register-post:
    enabled: true
    layout: plain-result
    successRedirect: /web/${component}/admin/entities/blog-post/${result.id}
    stayOnError: true
    controls:
      contentMarkup:
        type: select
        values: [html-fragment, markdown-gfm, smartdox]
        required: false
      content:
        type: textarea
        required: true
  blog-component.blog.create-post:
    enabled: true
    layout: plain-result
    successRedirect: /web/${component}/admin/entities/blog-post/${result.id}
    stayOnError: true
    controls:
      contentMarkup:
        type: select
        values: [html-fragment, markdown-gfm, smartdox]
        required: false
      content:
        type: textarea
        required: true
  blog-component.blog.search-posts:
    enabled: true
    layout: reader
    stayOnError: true
  blog-component.blog.search-my-posts:
    enabled: true
    layout: my
    stayOnError: true
  blog-component.blog.get-post:
    enabled: true
    layout: reader
  blog-component.blog.get-my-post:
    enabled: true
    layout: result-edit
  blog-component.blog.search-inline-images:
    enabled: true
    successRedirect: /web/${component}/admin/entities/blog-inline-image
    stayOnError: true
  blog-component.blog.list-tags:
    enabled: true

admin:
  entity.blog-post:
    totalCount: optional
  entity.blog-inline-image:
    totalCount: optional

routes:
  - path: /web/blog
    target:
      component: blog-component
      app: blog
    kind: alias
