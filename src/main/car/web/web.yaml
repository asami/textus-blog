defaultView: summary
shell:
  component: textus-blog
  app: blog
  layout: default
apps:
  - name: blog
    kind: static-form
    path: /web/blog
    root: /web/blog
    route: /web/blog
    layout: default
    composition: article
    assets:
      css:
        - /web/blog/assets/blog.css
      js:
        - /web/blog/assets/blog.js

pages:
  index:
    layout: default
    mode: article
  publicblogs:
    layout: reader
    mode: article
  userblogs:
    layout: my
    mode: article
  new:
    layout: edit
    mode: article
  update:
    layout: edit
    mode: article

expose:
  textus-blog.blog.import-post-tree: protected
  textus-blog.blog.register-post: protected
  textus-blog.blog.save-editor-post: protected
  textus-blog.blog.list-image-blobs: protected
  textus-blog.blog.create-post: protected
  textus-blog.blog.get-post: public
  textus-blog.blog.get-my-post: protected
  textus-blog.blog.search-posts: public
  textus-blog.blog.search-my-posts: protected
  textus-blog.blog.atom-feed: public
  textus-blog.blog.publish-post: protected
  textus-blog.blog.deactivate-post: protected
  textus-blog.blog.sync-inline-images: protected
  textus-blog.blog.search-inline-images: public
  textus-blog.blog.list-tags: public

form:
  textus-blog.blog.import-post-tree:
    enabled: true
    layout: plain-result
    successRedirect: /web/blog/userblogs
    stayOnError: true
    controls:
      fileBundle:
        type: file
        accept: .zip,application/zip
        required: true
  textus-blog.blog.save-editor-post:
    enabled: true
    layout: plain-result
    controls:
      contentMarkup:
        type: select
        values: [html-fragment, markdown-gfm, smartdox]
        required: false
      content:
        type: textarea
        required: true
  textus-blog.blog.register-post:
    enabled: true
    layout: plain-result
    successRedirect: /web/${component}/admin/entities/blog-post/${result.id}
    stayOnError: true
    controls:
      contentMarkup:
        type: select
        values: [html-fragment, markdown-gfm, smartdox]
        required: false
      content:
        type: textarea
        required: true
  textus-blog.blog.create-post:
    enabled: true
    layout: plain-result
    successRedirect: /web/${component}/admin/entities/blog-post/${result.id}
    stayOnError: true
    controls:
      contentMarkup:
        type: select
        values: [html-fragment, markdown-gfm, smartdox]
        required: false
      content:
        type: textarea
        required: true
  textus-blog.blog.search-posts:
    enabled: true
    layout: reader
    stayOnError: true
  textus-blog.blog.search-my-posts:
    enabled: true
    layout: my
    stayOnError: true
  textus-blog.blog.get-post:
    enabled: true
    layout: reader
  textus-blog.blog.get-my-post:
    enabled: true
    layout: result-edit
  textus-blog.blog.search-inline-images:
    enabled: true
    successRedirect: /web/${component}/admin/entities/blog-inline-image
    stayOnError: true
  textus-blog.blog.list-tags:
    enabled: true

admin:
  entity.blog-post:
    totalCount: optional
  entity.blog-inline-image:
    totalCount: optional

routes:
  - path: /web/blog
    target:
      component: textus-blog
      app: blog
    kind: alias
