<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Posts - Blog</title>
    <link rel="stylesheet" href="/web/blog/assets/blog.css">
  </head>
  <body data-page="my">
    <header class="topbar">
      <a class="brand" href="/web/blog">Blog</a>
      <nav class="topbar-actions">
        <a href="/web/blog">Public blog</a>
        <form action="/web/blog/logout" method="post" data-logout-form hidden>
          <button type="submit">Log out</button>
        </form>
        <span class="session-name" data-session-name></span>
      </nav>
    </header>

    <main class="dashboard-shell">
      <section class="page-head">
        <div>
          <h1>My posts</h1>
          <p>Drafts, published posts, and inactive posts you authored.</p>
        </div>
        <div class="page-actions">
          <a class="button-link" href="/web/blog/edit">New post</a>
          <button type="button" data-open-upload-dialog>Upload</button>
        </div>
      </section>

      <form class="search-form dashboard-search" data-search-form>
        <input type="search" name="text" placeholder="Search my posts" autocomplete="off">
        <button type="submit">Search</button>
      </form>

      <div class="post-list dashboard-list" data-my-post-list></div>
    </main>

    <dialog class="image-dialog" data-upload-dialog>
      <form method="dialog" class="dialog-head">
        <strong>Upload post</strong>
        <button type="submit">Close</button>
      </form>
      <form class="upload-form" data-upload-form>
        <label>
          Blog file bundle
          <input type="file" name="fileBundle" accept=".zip,application/zip" required>
        </label>
        <label class="checkbox-line">
          <input type="checkbox" name="publish">
          Publish
        </label>
        <div class="editor-actions">
          <button type="submit">Import</button>
        </div>
      </form>
    </dialog>

    <div class="toast" data-toast hidden></div>
    <script src="/web/blog/assets/blog.js"></script>
  </body>
</html>
