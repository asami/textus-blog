<header class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="/web/blog">Blog</a>
    <nav class="d-flex align-items-center gap-3">
      <a class="nav-link" href="/form/blog-component/blog/search-posts/result?textus.form.page=publicblogs&amp;limit=50&amp;includeDescendants=true">Public blog</a>
      <a class="nav-link" href="/form/blog-component/blog/search-my-posts/result?textus.form.page=userblogs&amp;limit=100&amp;includeDescendants=true" data-my-posts-link hidden>My posts</a>
      <a class="nav-link position-relative d-inline-flex align-items-center" href="/web/blog/jobs" title="Jobs" aria-label="Jobs" data-jobs-link ${pageContext.jobs.hidden}>
        <svg width="20" height="20" viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M9 6V5a3 3 0 0 1 3-3h0a3 3 0 0 1 3 3v1h3a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3Zm2 0h2V5a1 1 0 0 0-2 0v1Zm-5 5v8h12v-8h-3v2H9v-2H6Zm3-3H6v1h12V8h-3v2H9V8Z"/>
        </svg>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-primary" data-job-active-badge ${pageContext.jobs.activeBadgeHidden}>${pageContext.jobs.activeCount}</span>
        <span class="position-absolute top-100 start-100 translate-middle badge rounded-pill text-bg-warning" data-job-unconfirmed-badge ${pageContext.jobs.unconfirmedBadgeHidden}>${pageContext.jobs.unconfirmedCount}</span>
      </a>
      <a class="nav-link position-relative d-inline-flex align-items-center" href="/web/notifications" title="Notifications" aria-label="Notifications" data-notification-indicator ${pageContext.notification.indicatorHidden}>
        <svg width="20" height="20" viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6v-5a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Zm-2 1H7v-6a5 5 0 1 1 10 0v6Z"/>
        </svg>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-danger" data-notification-badge ${pageContext.notification.badgeHidden}>${pageContext.notification.unconfirmedCount}</span>
      </a>
      <a class="nav-link" href="/web/textus-user-account/signin?returnTo=%2Fweb%2Fblog%2Fuserblogs" data-login-link>Log in</a>
      <a class="btn btn-sm btn-outline-primary" href="/web/textus-user-account/signup?returnTo=%2Fweb%2Fblog%2Fuserblogs" data-signup-link>Create account</a>
      <form action="/web/blog/logout" method="post" data-logout-form hidden>
        <button class="btn btn-sm btn-outline-secondary" type="submit">Log out</button>
      </form>
      <span class="text-secondary small" data-session-name></span>
    </nav>
  </div>
</header>
