<div class="public-blog-page">
  <section data-list-section>
    <div class="card mb-3">
      <div class="card-body">
        <form class="search-form row g-2 align-items-end" action="/form/textus-blog/blog/search-posts" method="post" data-search-form>
          <input type="hidden" name="textus.form.page" value="publicblogs">
          <input type="hidden" name="limit" value="50">
          <input type="hidden" name="includeDescendants" value="true">
          <div class="col-12 col-md">
            <label class="form-label" for="public-blog-search-text">Search</label>
            <input class="form-control" id="public-blog-search-text" type="search" name="text" placeholder="Search posts" autocomplete="off">
          </div>
          <div class="col-12 col-md-4 col-xl-3">
            <label class="form-label" for="public-blog-search-tag">Tag</label>
            <input class="form-control" id="public-blog-search-tag" type="search" name="tag" data-tag-filter-input placeholder="Tag path" autocomplete="off">
          </div>
          <div class="col-12 col-md-auto d-grid">
            <button class="btn btn-primary" type="submit">Search</button>
          </div>
        </form>
      </div>
    </div>
    <div class="tag-filter alert alert-info py-2 mb-3 d-none flex-wrap align-items-center gap-2" data-tag-filter hidden>
      <span></span>
      <a class="alert-link" href="/web/blog/publicblogs" data-tag-clear>Clear</a>
    </div>
    <section class="card mb-3" aria-label="Browse tags" data-tag-nav-panel>
      <div class="card-body py-3">
        <h2 class="h6 card-title mb-2">Browse tags</h2>
        <div class="tag-nav" data-tag-nav></div>
      </div>
    </section>
    <div class="post-list row g-3" data-post-list>
      <noscript>
        <p class="col-12 text-secondary small">Use the search form to list public posts.</p>
      </noscript>
    </div>
  </section>

  <section class="d-none" data-detail-section>
    <a class="btn btn-outline-secondary btn-sm mb-3" href="/web/blog/publicblogs" data-back-to-list hidden>Back to public posts</a>
    <article class="blog-article card" data-article>
      <div class="card-body">
        <h1 class="card-title" data-article-title></h1>
        <div class="article-body" data-article-body></div>
      </div>
    </article>
  </section>
</div>
