<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Posts - Results</title>
    <link rel="stylesheet" href="/web/assets/bootstrap.min.css">
    <link rel="stylesheet" href="/web/assets/textus-widgets.css">
    <link rel="stylesheet" href="/web/blog/assets/blog.css">
  </head>
  <body>
    <header class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="/web/blog">Blog</a>
        <nav class="d-flex align-items-center gap-3">
          <a class="nav-link" href="/web/blog/publicblogs">Public blog</a>
          <a class="nav-link" href="/web/blog/jobs">My jobs</a>
          <a class="btn btn-sm btn-primary" href="/web/blog/new">New post</a>
        </nav>
      </div>
    </header>
    <main class="container py-4">
      <div class="card mb-3">
        <div class="card-body">
          <form class="search-form row g-2 align-items-end" action="/form/blog-component/blog/search-my-posts" method="post">
            <input type="hidden" name="textus.form.page" value="userblogs">
            <input type="hidden" name="limit" value="100">
            <input type="hidden" name="includeDescendants" value="true">
            <div class="col-12 col-md">
              <label class="form-label" for="my-blog-result-search-text">Search</label>
              <input class="form-control" id="my-blog-result-search-text" type="search" name="text" value="${form.text}" placeholder="Search my posts" autocomplete="off">
            </div>
            <div class="col-12 col-md-4 col-xl-3">
              <label class="form-label" for="my-blog-result-search-tag">Tag</label>
              <input class="form-control" id="my-blog-result-search-tag" type="search" name="tag" value="${form.tag}" placeholder="Tag path" autocomplete="off">
            </div>
            <div class="col-12 col-md-auto d-grid">
              <button class="btn btn-primary w-100" type="submit">Search</button>
            </div>
          </form>
        </div>
      </div>
      <div class="tag-filter alert alert-info py-2 mb-3 d-flex flex-wrap align-items-center gap-2" data-tag-filter>
        <strong>Tag:</strong>
        <span>${form.tag}</span>
        <a class="alert-link" href="/web/blog/userblogs">Clear</a>
      </div>
      <textus:card-list
        source="result.body"
        title="title"
        subtitle="slug"
        columns="title:Title,slug:Slug,tagPaths:Tags,post_status:Status,aliveness:Aliveness,updated_at:Updated"
        detail-href="/form/blog-component/blog/get-my-post/result"
        detail-param-id="{shortid}"
        detail-param-textus.form.page="userpost"
        detail-label="Review / edit"></textus:card-list>
    </main>
  </body>
</html>
