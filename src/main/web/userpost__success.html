<div class="user-post-result">
  <article class="blog-article">
    <textus:record-card source="result.body" title="title" subtitle="slug" columns="tagPaths:Tags,post_status:Status,aliveness:Aliveness,updated_at:Updated"></textus:record-card>
    <div class="card mt-4">
      <div class="card-body">
        <textus:html-field source="result.body" field="content" class="article-body"></textus:html-field>
      </div>
    </div>
  </article>
  <section class="edit-shell mt-5">
    <h2 class="h4">Edit this post</h2>
    <form class="editor-form editor-page-form d-flex flex-column gap-3" action="/form/textus-blog/blog/save-editor-post" method="post">
      <input type="hidden" name="textus.form.page" value="update">
      <input type="hidden" name="id" value="${result.body.shortid}">
      <input type="hidden" name="publish" value="${result.body.post_status}">
      <section class="card">
        <div class="card-body d-flex flex-column gap-3">
          <h3 class="h5 card-title">Post metadata</h3>
          <label>
            Slug
            <input class="form-control" name="slug" value="${result.body.slug}">
            <span class="form-text">Optional URL name. Leave blank to keep the current slug.</span>
          </label>
          <label>
            Title
            <input class="form-control" name="title" value="${result.body.title}" required>
          </label>
          <label>
            Description
            <input class="form-control" name="description" value="${result.body.description}">
          </label>
        </div>
      </section>
      <section class="card">
        <div class="card-body d-flex flex-column gap-3">
          <h3 class="h5 card-title">Content</h3>
          <label>
            Content format
            <input type="hidden" name="contentMarkup" value="${result.body.contentMarkup}" data-editor-markup-value>
            <select class="form-select" data-editor-markup data-current-content-markup="${result.body.contentMarkup}">
              <option value="html-fragment">HTML</option>
              <option value="markdown-gfm">Markdown</option>
              <option value="smartdox">SmartDox</option>
            </select>
          </label>
          <label>
            Body
            <textarea class="form-control" name="content" required>${result.body.contentSource}</textarea>
          </label>
        </div>
      </section>
      <section class="card">
        <div class="card-body d-flex flex-column gap-3">
          <h3 class="h5 card-title">Tags</h3>
          <label>
            Tags
            <textarea class="form-control tag-input" name="tags" data-tag-input placeholder="topic, topic.subtopic">${result.body.tagPaths}</textarea>
            <span class="form-text">Comma or newline separated tag paths.</span>
          </label>
          <div class="tag-suggestions" data-tag-suggestions aria-live="polite"></div>
        </div>
      </section>
      <div class="editor-actions">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="/web/blog/userblogs">Back to my posts</a>
        <a class="btn btn-outline-secondary" href="/web/blog/jobs">My jobs</a>
      </div>
    </form>
  </section>
</div>
