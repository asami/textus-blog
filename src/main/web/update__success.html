<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Post Updated - Blog</title>
    <link rel="stylesheet" href="/web/assets/bootstrap.min.css">
    <link rel="stylesheet" href="/web/blog/assets/blog.css">
  </head>
  <body>
    <main class="container py-5">
      <div class="alert alert-success">
        <h1 class="h4">Post updated</h1>
        <p>The post was saved.</p>
        <dl class="row mb-0">
          <dt class="col-sm-2">Short ID</dt>
          <dd class="col-sm-10">${result.body.shortid}</dd>
          <dt class="col-sm-2">Slug</dt>
          <dd class="col-sm-10">${result.body.slug}</dd>
          <dt class="col-sm-2">Entity ID</dt>
          <dd class="col-sm-10">${result.body.entity_id}</dd>
        </dl>
      </div>
      <a class="btn btn-primary" href="/web/blog/userblogs">Back to my posts</a>
    </main>
  </body>
</html>
