<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Public Blog - Results</title>
    <link rel="stylesheet" href="/web/assets/bootstrap.min.css">
    <link rel="stylesheet" href="/web/assets/textus-widgets.css">
    <link rel="stylesheet" href="/web/blog/assets/blog.css">
  </head>
  <body>
    <header class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="/web/blog">Blog</a>
        <nav class="d-flex align-items-center gap-3">
          <a class="nav-link" href="/web/blog/userblogs">My posts</a>
          <a class="nav-link" href="/rest/v1/blog/blog/atomFeed">Atom</a>
        </nav>
      </div>
    </header>
    <main class="container py-4">
      <form class="search-form row g-2 align-items-center mb-4" action="/form/blog-component/blog/search-posts" method="post">
        <input type="hidden" name="textus.form.page" value="publicblogs">
        <input type="hidden" name="limit" value="50">
        <div class="col-12 col-md">
          <input class="form-control" type="search" name="text" value="${form.text}" placeholder="Search posts" autocomplete="off">
        </div>
        <div class="col-12 col-md-4 col-xl-3">
          <input class="form-control" type="search" name="tag" value="${form.tag}" placeholder="Tag path" autocomplete="off">
        </div>
        <input type="hidden" name="includeDescendants" value="true">
        <div class="col-12 col-md-auto d-grid">
          <button class="btn btn-primary w-100" type="submit">Search</button>
        </div>
      </form>
      <div class="tag-filter mb-3">
        <strong>Tag:</strong>
        <span>${form.tag}</span>
        <a href="/web/blog/publicblogs">Clear</a>
      </div>
      <textus:card-list
        source="result.body"
        title="title"
        subtitle="slug"
        columns="title:Title,slug:Slug,tagPaths:Tags,updated_at:Updated"
        detail-href="/form/blog-component/blog/get-post/result"
        detail-param-id="{shortid}"
        detail-param-textus.form.page="publicpost"
        detail-label="Read"
        empty="No public posts"></textus:card-list>
    </main>
  </body>
</html>
