<div class="public-blog-results">
  <div class="card mb-3">
    <div class="card-body">
      <form class="search-form row g-2 align-items-end" action="/form/blog-component/blog/search-posts" method="post">
        <input type="hidden" name="textus.form.page" value="publicblogs">
        <input type="hidden" name="limit" value="50">
        <input type="hidden" name="includeDescendants" value="true">
        <div class="col-12 col-md">
          <label class="form-label" for="public-blog-result-search-text">Search</label>
          <input class="form-control" id="public-blog-result-search-text" type="search" name="text" value="${form.text}" placeholder="Search posts" autocomplete="off">
        </div>
        <div class="col-12 col-md-4 col-xl-3">
          <label class="form-label" for="public-blog-result-search-tag">Tag</label>
          <input class="form-control" id="public-blog-result-search-tag" type="search" name="tag" value="${form.tag}" placeholder="Tag path" autocomplete="off">
        </div>
        <div class="col-12 col-md-auto d-grid">
          <button class="btn btn-primary" type="submit">Search</button>
        </div>
      </form>
    </div>
  </div>
  <div class="tag-filter alert alert-info py-2 mb-3 d-flex flex-wrap align-items-center gap-2" data-tag-filter>
    <strong>Tag:</strong>
    <span>${form.tag}</span>
      <a class="alert-link" href="/form/blog-component/blog/search-posts/result?textus.form.page=publicblogs&amp;limit=50&amp;includeDescendants=true">Clear</a>
  </div>
  <textus:card-list
    source="result.body"
    title="title"
    subtitle="slug"
    columns="title:Title,slug:Slug,tagPaths:Tags,updated_at:Updated"
    detail-href="/form/blog-component/blog/get-post/result"
    detail-param-id="{shortid}"
    detail-param-textus.form.page="publicpost"
    detail-label="Read"
    empty="No public posts"></textus:card-list>
</div>
