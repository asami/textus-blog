<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Post - Blog</title>
    <link rel="stylesheet" href="/web/blog/assets/blog.css">
  </head>
  <body data-page="edit">
    <header class="topbar">
      <a class="brand" href="/web/blog">Blog</a>
      <nav class="topbar-actions">
        <a href="/web/blog">Public blog</a>
        <a href="/web/blog/my">My posts</a>
        <form action="/web/blog/logout" method="post" data-logout-form hidden>
          <button type="submit">Log out</button>
        </form>
        <span class="session-name" data-session-name></span>
      </nav>
    </header>

    <main class="edit-shell">
      <section class="page-head">
        <div>
          <h1 data-editor-heading>New post</h1>
          <p>Write HTML fragment content for the BlogPost body.</p>
        </div>
        <div class="page-actions">
          <a class="button-link" href="/web/blog/my">Back to my posts</a>
        </div>
      </section>

      <form class="editor-form editor-page-form" data-editor-form>
        <input type="hidden" name="id" data-editor-id>
        <label>
          Slug
          <input name="slug" data-editor-slug required>
        </label>
        <label>
          Title
          <input name="title" data-editor-title required>
        </label>
        <label>
          Content
          <textarea name="content" data-editor-content required></textarea>
        </label>
        <label>
          Description
          <input name="description" data-editor-description>
        </label>
        <label class="checkbox-line">
          <input type="checkbox" name="publish" data-editor-publish>
          Publish
        </label>
        <div class="editor-actions">
          <button type="button" data-open-image-picker>Images</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </main>

    <dialog class="image-dialog" data-image-dialog>
      <form method="dialog" class="dialog-head">
        <strong>Images</strong>
        <button type="submit">Close</button>
      </form>
      <div class="image-grid" data-image-grid></div>
    </dialog>

    <div class="toast" data-toast hidden></div>
    <script src="/web/blog/assets/blog.js"></script>
  </body>
</html>
