<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog</title>
    <link rel="stylesheet" href="/web/blog/assets/blog.css">
  </head>
  <body data-page="reader">
    <header class="topbar">
      <a class="brand" href="/web/blog">Blog</a>
      <nav class="topbar-actions">
        <a href="/web/blog/my" data-my-posts-link hidden>My posts</a>
        <a href="/web/textus-user-account/signin?returnTo=%2Fweb%2Fblog%2Fmy" data-login-link>Log in</a>
        <a href="/web/textus-user-account/signup?returnTo=%2Fweb%2Fblog%2Fmy" data-signup-link>Create account</a>
        <form action="/web/blog/logout" method="post" data-logout-form hidden>
          <button type="submit">Log out</button>
        </form>
        <span class="session-name" data-session-name></span>
      </nav>
    </header>

    <main class="reader-shell">
      <section class="reader-pane">
        <div class="list-toolbar">
          <form class="search-form" data-search-form>
            <input type="search" name="text" placeholder="Search posts" autocomplete="off">
            <button type="submit">Search</button>
          </form>
          <a class="feed-link" href="/rest/v1/blog/blog/atomFeed">Atom</a>
        </div>
        <div class="post-list" data-post-list></div>
      </section>

      <section class="article-pane" data-article-pane>
        <article class="blog-article" data-article>
          <h1 data-article-title></h1>
          <div class="article-body" data-article-body></div>
        </article>
      </section>
    </main>

    <div class="toast" data-toast hidden></div>
    <script src="/web/blog/assets/blog.js"></script>
  </body>
</html>
